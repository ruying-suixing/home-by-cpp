name: Build Wasm & Deploy Static Files
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 换成市面上通用靠谱的emsdk安装Action
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      # 校验编译器是否就绪
      - name: Check emcc version
        run: emcc -v

      # 编译C++为 wasm
      - name: Compile C++ to Wasm
        run: |
          emcc src/main.cpp -o main.js \
            -s EXPORTED_FUNCTIONS='["getAuthorInfo","getSkillList","printLog"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall"]' \
            -s ALLOW_MEMORY_GROWTH=1 \
            -Oz

      # 上传静态产物用于Pages部署
      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4