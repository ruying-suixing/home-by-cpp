<!DOCTYPE html>

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的C++个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>基于 C++ + WebAssembly 的个人主页</h1>
        <div id="info"></div>
        <div id="skills"></div>
        <button onclick="callCppLog()">点我调用C++打印日志</button>
    </div>

    <!-- Emscripten生成的wasm胶水js -->
    <script src="main.js"></script>
    <script>
        let Module;
        // 等待Wasm初始化完成
        Module = {
            onRuntimeInitialized: function() {
                // 调用C++函数
                const info = Module.ccall('getAuthorInfo', 'string', [], []);
                const skills = Module.ccall('getSkillList', 'string', [], []);
                document.getElementById('info').innerText = info;
                document.getElementById('skills').innerText = "技能栈：" + skills;
            }
        };
        function callCppLog() {
            Module.ccall('printLog', null, ['string'], ['欢迎访问我的C++主页！']);
        }
    </script>
</body>
</html>
