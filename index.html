<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的C++个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>基于 C++ + WebAssembly 的个人主页</h1>
        <div id="loading">正在加载Wasm模块...</div>
        <div id="info"></div>
        <div id="skills"></div>
        <button id="logBtn" disabled>点我调用C++打印日志</button>
    </div>

<script>
// 不使用let，直接全局赋值Module，解决重复声明报错
Module = {
    onRuntimeInitialized: function() {
        document.getElementById('loading').innerText = "✅ Wasm加载完成";
        const btn = document.getElementById('logBtn');
        btn.disabled = false;
        // JS绑定点击事件，脱离onclick全局函数依赖
        btn.addEventListener('click', callCppLog);

        // 初始化页面信息
        const infoText = Module.ccall('getAuthorInfo', 'string', [], []);
        const skillText = Module.ccall('getSkillList', 'string', [], []);
        document.getElementById('info').innerText = infoText;
        document.getElementById('skills').innerText = "技能栈：" + skillText;
    }
};

// 全局函数
function callCppLog() {
    if (!Module || typeof Module.ccall !== "function") {
        alert("Wasm还在加载，请稍后点击！");
        return;
    }
    Module.ccall('printLog', null, ['string'], ['欢迎访问我的C++主页！']);
}
</script>
<!-- Module配置写在前面，后加载main.js -->
<script src="main.js"></script>
</body>
</html>
