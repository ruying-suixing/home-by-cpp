<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的C++个人主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>基于 C++ + WebAssembly 的个人主页</h1>
        <div id="loading">正在加载Wasm模块...</div>
        <div id="info"></div>
        <div id="skills"></div>
        <button id="logBtn" disabled>点我调用C++打印日志</button>
    </div>

<script>
Module = {
    onRuntimeInitialized: function() {
        document.getElementById('loading').innerText = "✅ Wasm加载完成";
        const btn = document.getElementById('logBtn');
        btn.disabled = false;
        btn.addEventListener('click', callCppLog);

        // 获取作者信息
        const infoPtr = Module.ccall('getAuthorInfo', 'number', [], []);
        const infoText = Module.UTF8ToString(infoPtr);
        Module.ccall('freeStr', null, ['number'], [infoPtr]); // 释放
        document.getElementById('info').innerText = infoText;

        // 获取技能栈
        const skillPtr = Module.ccall('getSkillList', 'number', [], []);
        const skillText = Module.UTF8ToString(skillPtr);
        Module.ccall('freeStr', null, ['number'], [skillPtr]); // 释放
        document.getElementById('skills').innerText = "技能栈：" + skillText;
    }
};

// 全局函数
function callCppLog() {
    if (!Module || typeof Module.ccall !== "function") {
        alert("Wasm还在加载，请稍后点击！");
        return;
    }
    Module.ccall('printLog', null, ['string'], ['欢迎访问我的C++主页！']);
}
</script>
<!-- Module配置写在前面，后加载main.js -->
<script src="main.js"></script>
</body>
</html>
